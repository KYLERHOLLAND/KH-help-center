input: .
output: .retype

# Custom domain — Retype generates CNAME for GitHub Pages on each build
url: help.kylerholland.com

meta:
  siteName: KH Help Center

favicon: assets/favicon.png

branding:
  logo: assets/logo.png
  logoDark: assets/logo-dark.png
  logoHeight: 32
  label: Help Center

links:
  - text: Back to main site
    link: https://www.kylerholland.com

footer:
  copyright: "&copy; Copyright {{ year }} - Kyler Holland | All rights reserved"

editor:
  enabled: false


actions:
  items:
    - text: Copy page
      action: copy-page-markdown
      icon: copy
    - text: Copy link
      action: copy-page-link
      icon: link
    - type: separator
    - text: View as Markdown
      action: view-page-markdown
      icon: markdown
    - text: Print page
      action: print-page
      icon: brand-printer