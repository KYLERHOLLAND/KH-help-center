<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<script data-cfasync="false">
(function () {
  function setFavicon() {
    var href = "/favicon.ico";
    var links = document.querySelectorAll('link[rel="icon"], link#retype-favicon');
    for (var i = 0; i < links.length; i++) {
      links[i].href = href;
    }
    if (!document.getElementById("retype-favicon")) {
      var link = document.createElement("link");
      link.id = "retype-favicon";
      link.rel = "icon";
      link.href = href;
      document.head.appendChild(link);
    }
  }
  setFavicon();
  document.addEventListener("turbo:load", setFavicon);
  document.addEventListener("turbo:render", setFavicon);
})();
</script>
